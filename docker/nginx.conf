# Egyszerű gateway a Kong helyett: a Supabase kliens egyetlen URL-t vár,
# ami alatt az auth (/auth/v1) és a REST API (/rest/v1) is elérhető.
#
# A CORS-t is itt kezeljük (a hivatalos Supabase stackben ezt a Kong végzi):
# az app a localhost:3000-ről hívja a localhost:8000-et, ami cross-origin,
# ezért a böngésző preflight (OPTIONS) kérésére is válaszolni kell.
server {
    listen 8000;

    set $cors_allow_headers 'authorization, apikey, content-type, x-client-info, x-supabase-api-version, prefer, range, accept, accept-profile, content-profile';

    location /auth/v1/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers $cors_allow_headers always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $http_origin always;

        proxy_pass http://auth:9999/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /rest/v1/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers $cors_allow_headers always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Expose-Headers 'content-range, x-supabase-api-version' always;

        proxy_pass http://rest:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
