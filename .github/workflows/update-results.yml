# Eredményfrissítő cron — a Vercel Hobby terven nincs 5 perces cron,
# ezért a gyakori frissítést GitHub Actions hívja.
# Szükséges repo secretek: APP_URL (pl. https://vb-tippelo.vercel.app), CRON_SECRET
name: Update match results

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Call update-results endpoint
        run: |
          curl --fail-with-body -sS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/update-results"
