# Lokális fejlesztői környezet — minimális Supabase stack.
#
# Az app nem nyers Postgreshez csatlakozik, hanem a Supabase API-khoz,
# ezért a DB mellett kell a GoTrue (auth), a PostgREST (REST API) és egy
# nginx gateway, ami a kettőt egy URL alá fésüli (http://localhost:8000).
#
# Indítás:  docker compose up -d
# Reset:    docker compose down -v   (minden lokális adat törlődik!)

name: sports-bet

x-jwt-secret: &jwt-secret local-dev-jwt-secret-at-least-32-characters-long!!

services:
  db:
    image: supabase/postgres:15.8.1.060
    environment:
      POSTGRES_PASSWORD: postgres
      JWT_SECRET: *jwt-secret
      JWT_EXP: "3600"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:ro
      - ./docker/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:ro
    ports:
      - "54322:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 30

  auth:
    image: supabase/auth:v2.164.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: http://localhost:8000
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:postgres@db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: http://localhost:3000
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: *jwt-secret
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      # Lokálisan nincs SMTP — a regisztráció e-mail-megerősítés nélkül él
      GOTRUE_MAILER_AUTOCONFIRM: "true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Az app sémáját (supabase/migrations) tölti be egyszer, induláskor
  db-migrate:
    image: supabase/postgres:15.8.1.060
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./supabase/migrations:/migrations:ro
      - ./docker/db/migrate.sh:/migrate.sh:ro
    entrypoint: ["sh", "/migrate.sh"]
    restart: "no"

  rest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://authenticator:postgres@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: *jwt-secret
      PGRST_DB_USE_LEGACY_GUCS: "false"

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - auth
      - rest
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:8000"

volumes:
  db-data:
